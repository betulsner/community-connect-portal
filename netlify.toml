[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Map /api/chat → the Netlify function so the React app never needs to change
[[redirects]]
  from   = "/api/chat"
  to     = "/.netlify/functions/chat"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
